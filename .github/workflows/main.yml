name: build
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download UnityEngine DLL
        run: |
          powershell -Command "Invoke-WebRequest -Uri 'https://github.com/EvaisaAM/Unity-Internal-Libraries/raw/master/UnityEngine.dll' -OutFile 'UnityEngine.dll'"

      - name: Create CSharp Project
        run: |
          # プロジェクトファイルを直接生成して、参照をガチガチに固定するぜ
          echo '<Project Sdk="Microsoft.NET.Sdk">' > Project.csproj
          echo '  <PropertyGroup>' >> Project.csproj
          echo '    <TargetFramework>net6.0</TargetFramework>' >> Project.csproj
          echo '    <ImplicitUsings>enable</ImplicitUsings>' >> Project.csproj
          echo '    <Nullable>enable</Nullable>' >> Project.csproj
          echo '  </PropertyGroup>' >> Project.csproj
          echo '  <ItemGroup>' >> Project.csproj
          echo '    <Reference Include="UnityEngine">' >> Project.csproj
          echo '      <HintPath>./UnityEngine.dll</HintPath>' >> Project.csproj
          echo '    </Reference>' >> Project.csproj
          echo '  </ItemGroup>' >> Project.csproj
          echo '</Project>' >> Project.csproj

      - name: Build with Dotnet
        run: |
          dotnet build -c Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DLL
          path: bin/Release/net6.0/Project.dll
