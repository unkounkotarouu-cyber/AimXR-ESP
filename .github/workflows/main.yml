name: build
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Libs
        run: |
          powershell -Command "Invoke-WebRequest -Uri 'https://github.com/EvaisaAM/Unity-Internal-Libraries/raw/master/UnityEngine.dll' -OutFile 'UnityEngine.dll'"
          powershell -Command "Invoke-WebRequest -Uri 'https://github.com/EvaisaAM/Unity-Internal-Libraries/raw/master/UnityEngine.IMGUIModule.dll' -OutFile 'UnityEngine.IMGUIModule.dll'"

      - name: Locate CSC and Build
        run: |
          # サーバー内のどこかに隠れている csc.exe を力ずくで見つけて実行するぜ
          $cscPath = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Filter "csc.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          & $cscPath /target:library /out:Project.dll /reference:UnityEngine.dll /reference:UnityEngine.IMGUIModule.dll ESP.cs

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DLL
          path: Project.dll
