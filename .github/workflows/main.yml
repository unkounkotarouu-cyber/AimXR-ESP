name: build
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.x'

      - name: Download UnityEngine DLL
        run: |
          powershell -Command "Invoke-WebRequest -Uri 'https://github.com/EvaisaAM/Unity-Internal-Libraries/raw/master/UnityEngine.dll' -OutFile 'UnityEngine.dll'"

      - name: Build Project
        run: |
          dotnet new classlib -n Project -o . --force
          move-item -path ESP.cs -destination ./Class1.cs -force
          dotnet add System.Drawing.Common.dll --package 6.0.0 || echo "skip"
          dotnet build -c Release /p:ReferencePath=./UnityEngine.dll

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DLL
          path: bin/Release/net6.0/Project.dll
