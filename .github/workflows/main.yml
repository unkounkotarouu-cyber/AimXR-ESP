name: build
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Libs Safely
        shell: powershell
        run: |
          # より強力なダウンロード方法に切り替えるぜ
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri "https://github.com/EvaisaAM/Unity-Internal-Libraries/raw/master/UnityEngine.dll" -OutFile "UnityEngine.dll" -UserAgent "Mozilla/5.0"

      - name: Build with CSC
        shell: cmd
        run: |
          # サーバー内の最新パスを直接指定して、逃げ道をなくすぜ
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\Roslyn\csc.exe" /target:library /out:Project.dll /reference:UnityEngine.dll ESP.cs

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DLL
          path: Project.dll
